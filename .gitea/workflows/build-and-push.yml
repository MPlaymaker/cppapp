name: Build and Push to Local Registry

on:
  push:
    branches: [ main ]

jobs:
  build-linux-container:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        run: |
          # 1. Force remove any broken or cached local-builder setups
          docker buildx rm local-builder || true
          
          # 2. Create a builder that uses the host's native docker daemon directly
          docker buildx create --use --name local-builder --driver docker
          docker buildx inspect --bootstrap

      - name: Build and Push to Local Registry
        run: |
          docker buildx build \
            --file ./dockerfile \
            --tag host.docker.internal:5001/hello:latest \
            --push \
            .