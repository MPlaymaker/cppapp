name: Build and Push to Local Registry

on:
  push:
    branches: [ main ]

jobs:
  build-linux-container:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout Code (Points to your local Gitea instance)
      - name: Checkout Code
        uses: http://localhost:3000/actions/checkout@v4

      # 2. Set up Docker Buildx (Points to your local Gitea instance)
      - name: Set up Docker Buildx
        uses: http://localhost:3000/docker/setup-buildx-action@v3

      # 3. Build and Push (Points to your local Gitea instance)
      - name: Build and Push to Local Registry
        uses: http://localhost:3000/docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: host.docker.internal:5001/hello:latest