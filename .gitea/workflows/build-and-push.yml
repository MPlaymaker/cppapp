name: Build and Push to Local Registry

on:
  push:
    branches: [ main ]

jobs:
  build-linux-container:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout Code (Points to your local Gitea instance)
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx (Points to your local Gitea instance)
      - name: Set up Docker Buildx
        uses: http://host.docker.internal:3000/playmaker/cppapp/docker/setup-buildx-action@main

      # 3. Build and Push (Points to your local Gitea instance)
      - name: Build and Push to Local Registry
        uses: http://host.docker.internal:3000/playmaker/cppapp/docker/build-push-action@main
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: host.docker.internal:5001/hello:latest